<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <header>
            <input type="text" id="tarefa" placeholder="Tarefa" required>

            <input type="time" id="tempo">       
            
            <button id="add"  onclick="listanova()">Adicionar</button>
            
        </header>

        <main>
            <ul id="lista" class="listas"></ul>
            
        </main>

    
    <script>
    const lista = document.getElementById("lista");
    const input = document.getElementById("tarefa");
    const tempo = document.getElementById("tempo")

    function listanova(){
        if(input.value.trim() === "") return;

        const novoItem = document.createElement("li");

        
        const texto = document.createElement("span");
        texto.textContent = input.value;

        const horario = document.createElement("span");
        horario.textContent = tempo.value + 'h';
        
        const deletebutton = document.createElement("button");
        deletebutton.classList.add("addlista")
        deletebutton.textContent = "Delete";

        
        deletebutton.onclick = function() {
            lista.removeChild(novoItem);
        };

        novoItem.appendChild(texto);
        novoItem.appendChild(horario)
        novoItem.appendChild(deletebutton);

        lista.appendChild(novoItem);

        document.getElementById("tempo").value = "";
        input.value = "";
    }

    
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" id="tarefa" placeholder="Tarefa">
    <button id="add" onclick="listanova()">Adicionar</button>
    <ul id="lista" class="listas"></ul>
    <ul id="del" class="listas"></ul>

    
    <script>
    const lista = document.getElementById("lista");
    const input = document.getElementById("tarefa");

    function listanova(){
        if(input.value.trim() === "") return;

        const novoItem = document.createElement("li");

        // Criar span para o texto
        const texto = document.createElement("span");
        texto.textContent = input.value;

        // Criar botão delete
        const deletebutton = document.createElement("button");
        deletebutton.textContent = "Delete";

        // Função para remover o item
        deletebutton.onclick = function() {
            lista.removeChild(novoItem);
        };

        // Adiciona texto e botão dentro do mesmo li
        novoItem.appendChild(texto);
        novoItem.appendChild(deletebutton);

        lista.appendChild(novoItem);

        input.value = "";
    }
</script>
</body>
</html>
